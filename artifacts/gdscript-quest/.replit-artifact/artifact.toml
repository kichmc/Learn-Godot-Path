kind = "web"
previewPath = "/"
title = "GDScript Quest"
version = "1.0.0"
id = "artifacts/gdscript-quest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21430

[services.development]
run = "pnpm --filter @workspace/gdscript-quest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gdscript-quest", "run", "build" ]
publicDir = "artifacts/gdscript-quest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21430"
BASE_PATH = "/"
